<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成长印记 - 科技感小程序头像</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0f 0%, #0d1b2a 50%, #1b263b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00fff2, #9d4edd, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 8px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .avatar-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 30px;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 
        0 0 80px rgba(0, 255, 242, 0.3),
        0 0 120px rgba(157, 78, 221, 0.2);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { 
        box-shadow: 0 0 80px rgba(0, 255, 242, 0.3), 0 0 120px rgba(157, 78, 221, 0.2);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 100px rgba(0, 255, 242, 0.5), 0 0 150px rgba(157, 78, 221, 0.3);
        transform: scale(1.02);
      }
    }
    .features {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .feature {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,255,242,0.15);
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .feature:hover {
      border-color: rgba(0,255,242,0.4);
      background: rgba(0,255,242,0.05);
    }
    .feature-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .feature-text {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 1px;
    }
    .download-tip {
      background: linear-gradient(135deg, rgba(0,255,242,0.08), rgba(157,78,221,0.08));
      border: 1px solid rgba(0,255,242,0.2);
      border-radius: 16px;
      padding: 20px 35px;
      text-align: center;
      max-width: 420px;
      margin-bottom: 25px;
    }
    .download-tip p {
      font-size: 14px;
      color: #ccc;
      line-height: 1.8;
    }
    .highlight {
      color: #00fff2;
      font-weight: bold;
    }
    .highlight-purple {
      color: #9d4edd;
      font-weight: bold;
    }
    .actions {
      display: flex;
      gap: 15px;
    }
    .btn {
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00fff2, #00b4d8);
      color: #0a0a0f;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #9d4edd;
      color: #9d4edd;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,255,242,0.25);
    }
  </style>
</head>
<body>
  <h1>成长印记</h1>
  <p class="subtitle">记录每一刻珍贵时光</p>
  
  <div class="avatar-container">
    <img src="growth-marks-logo.svg" alt="成长印记科技感头像" class="avatar">
  </div>
  
  <div class="features">
    <div class="feature">
      <div class="feature-icon">⬡</div>
      <div class="feature-text">六边形科技</div>
    </div>
    <div class="feature">
      <div class="feature-icon">◎</div>
      <div class="feature-text">数据光环</div>
    </div>
    <div class="feature">
      <div class="feature-icon">✦</div>
      <div class="feature-text">星尘粒子</div>
    </div>
    <div class="feature">
      <div class="feature-icon">◈</div>
      <div class="feature-text">金色核心</div>
    </div>
  </div>
  
  <div class="download-tip">
    <p>在浏览器中<span class="highlight">右键点击头像</span>，选择 <span class="highlight">"另存为"</span> 保存 PNG 格式</p>
    <p style="margin-top:8px;color:#666;">推荐尺寸：<span class="highlight-purple">432×432 像素</span></p>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" onclick="location.reload()">🔄 刷新预览</button>
    <button class="btn btn-secondary" onclick="window.close()">✕ 关闭</button>
  </div>
</body>
</html>
