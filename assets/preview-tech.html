<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>萌宝记 - 科技感头像预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0f0f2a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .avatar-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 30px;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 
        0 0 60px rgba(0, 245, 255, 0.3),
        0 0 100px rgba(255, 0, 255, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 60px rgba(0, 245, 255, 0.3), 0 0 100px rgba(255, 0, 255, 0.2); }
      50% { box-shadow: 0 0 80px rgba(0, 245, 255, 0.5), 0 0 120px rgba(255, 0, 255, 0.3); }
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
      max-width: 500px;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,245,255,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .feature-text {
      font-size: 12px;
      color: #aaa;
    }
    .download-tip {
      background: rgba(0,245,255,0.1);
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 12px;
      padding: 20px 30px;
      text-align: center;
      max-width: 400px;
    }
    .download-tip p {
      font-size: 14px;
      color: #ccc;
      line-height: 1.6;
    }
    .highlight {
      color: #00f5ff;
      font-weight: bold;
    }
    .actions {
      margin-top: 25px;
      display: flex;
      gap: 15px;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00f5ff, #0080ff);
      color: #000;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #ff00ff;
      color: #ff00ff;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,245,255,0.3);
    }
  </style>
</head>
<body>
  <h1>萌宝记</h1>
  <p class="subtitle">科技感小程序头像</p>
  
  <div class="avatar-container">
    <img src="mengbaoji-tech.svg" alt="萌宝记科技感头像" class="avatar">
  </div>
  
  <div class="features">
    <div class="feature">
      <div class="feature-icon">🔷</div>
      <div class="feature-text">芯片设计</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💡</div>
      <div class="feature-text">霓虹发光</div>
    </div>
    <div class="feature">
      <div class="feature-icon">⚡</div>
      <div class="feature-text">粒子效果</div>
    </div>
  </div>
  
  <div class="download-tip">
    <p>在浏览器中<span class="highlight">右键点击头像</span>，选择 <span class="highlight">"另存为"</span> 可保存 PNG 格式</p>
  </div>
  
  <div class="actions">
    <button class="btn btn-primary" onclick="location.reload()">🔄 刷新预览</button>
    <button class="btn btn-secondary" onclick="window.close()">✕ 关闭</button>
  </div>
</body>
</html>
